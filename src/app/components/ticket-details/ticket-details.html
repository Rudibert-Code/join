<app-ticket-edit></app-ticket-edit>
<dialog class="ticket" id="ticket_card">
    <section class="header">
      <div class="task-card__category">
        <!--<p class="task-card__category margin-correction" [ngClass]="getTaskCardClass(task.category)">-->
        <p class="ticket_category" id="ticket_category">
          <!--{{ task.category }}-->
        </p>
      </div>
      <button (click)="closeTC(false)" class="exit_btn">
        <img src="assets/UI/icon_cancle.png" alt="" />
      </button>
    </section>
    <!--<h2 class="title"> {{ task.title }} </h2>-->
    <h2 class="title" id="ticket_title"></h2>
    <section class="ticket_details">
      <!--<p>{{ task.description }}</p>-->
      <p id="ticket_description"></p>
      <div class="data">
        <p class="foreword">Due Date:</p>
        <!--<p class="ticket_date"> {{ task.due_date }} </p>-->
        <p class="ticket_date" id="ticket_due-date"></p>
      </div>
      <div class="data">
        <p class="foreword">Priority:</p>
        <div class="data">
          <!--<p class="prio" id="prio-text">{{ task.priority }}</p>-->
          <p class="prio" id="ticket_priority"></p>
          <img src="" alt="" id="prio-icon" />
        </div>
      </div>
    </section>
    <section class="ticket_details">
      <p class="foreword">Assigned to:</p>
      <div class="scroll_list" id="contact_list">
        @for (contact of cs.contactsCache; track $index) {
          <div class="contacts">
            <div class="contacts_icon" [style.background-color]="contact.color">
              <p class="icon_text">{{ contact.initials }}</p>
            </div>
            <p class="contacts">{{ contact.name }} {{ contact.surname }}</p>
          </div>
        }
      </div>
    </section>
    <section class="ticket_details">
      <p class="foreword">Subtasks:</p>
      <div class="scroll_list">
        <!--Generate subtasks here-->
        @for (subtask of board.subtasksCache; track $index) {
          <div class="subtasks">
            <img
              (click)="checkBox(subtask)"
              class="subtasks_btn_{{ subtask.is_Done }}"
              src="assets/UI/checkbox_default.png"
              alt=""
              id="checkbox_{{ subtask.id }}"
            />
            <p>{{ subtask.title }}</p>
          </div>
        }
      </div>
    </section>
    <section class="footer">
      <div (click)="deleteTicket()" class="footer_btn">
