<div class="contact-button_shape" (click)="openContactForm()" >
    <img src="assets/UI/vector/icon_add-user.svg" alt="" id="contact-button_img">
</div>

<app-contact-form *ngIf="showContactForm()" (close)="closeContactForm()"></app-contact-form>
<app-edit-contact-modal
    *ngIf="showEditModal() && contactId !== null"
    [contactId]="contactId!"
    (close)="closeEditModal()"
></app-edit-contact-modal>
