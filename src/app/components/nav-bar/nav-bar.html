<nav>
  <img class="navbar__logo" src="assets/UI/vector/logo_join-white.svg" alt="Join" />

  @if (auth.isLoggedIn()) {
    <section class="navbar__links">
      <a class="navbar__link" [routerLink]="['/summary']" routerLinkActive="active">
        <div class="navbar__icon">
          <img src="assets/UI/vector/icon_summary.svg" alt="Summary" />
        </div>
        <div class="navbar__name">
          <p>Summary</p>
        </div>
      </a>
      <a class="navbar__link" [routerLink]="['/add-task']" routerLinkActive="active">
        <div class="navbar__icon">
          <img src="assets/UI/vector/icon_add-task.svg" alt="Add Task" />
        </div>
        <div class="navbar__name">
          <p>Add Task</p>
        </div>
      </a>
      <a class="navbar__link" [routerLink]="['/board']" routerLinkActive="active">
        <div class="navbar__icon">
          <img src="assets/UI/vector/icon_board.svg" alt="Board" />
        </div>
        <div class="navbar__name">
          <p>Board</p>
        </div>
      </a>
      <a class="navbar__link" [routerLink]="['/contact-list']" routerLinkActive="active">
        <div class="navbar__icon">
          <img src="assets/UI/icon_contacts.png" alt="Contacts" />
        </div>
        <div class="navbar__name">
          <p>Contacts</p>
        </div>
      </a>
    </section>
  } @else {
    <section class="navbar__links">
      <a class="navbar__link" [routerLink]="['/login']" routerLinkActive="active">
        <div class="navbar__icon">
          <img src="assets/UI/vector/icon_login.svg" alt="Log in" />
        </div>
        <div class="navbar__name">
          <p>Log in</p>
        </div>
      </a>
    </section>
  }

  <section class="navbar__links--legals">
    <a
      class="navbar__link navbar__legal-link"
      [routerLink]="['/privacy-policy']"
      routerLinkActive="active"
    >
      <div class="navbar__name">
        <p>Privacy Policy</p>
      </div>
    </a>
    <a
      class="navbar__link navbar__legal-link"
      [routerLink]="['/legal-notice']"
      routerLinkActive="active"
    >
      <div class="navbar__name">
        <p>Legal notice</p>
      </div>
    </a>
  </section>
</nav>
