<main class="main-wrapper">
  <div id="splash-container">
    <div class="splash-screen"></div>
    <header class="d-flex left-bound">
      <img id="logo" class="logo" src="assets/UI/logo_join.png" alt="company logo" />
    </header>
  </div>
  <section class="d-flex column login-wrapper">
    <div>
      <h3 class="login">Log In</h3>
      <div class="d-flex center">
        <div class="underline"></div>
      </div>
      <form class="d-flex column input-wrapper">
        <div class="input-icon-wrapper">
          <input
            class="input-field"
            type="email"
            id="email"
            name="email"
            placeholder="Email"
            required
          />
          <img class="mail-icon" src="assets/UI/icon_mail.png" alt="mail icon" />
        </div>
        <div class="input-icon-wrapper">
          <input
            class="input-field"
            type="password"
            id="pwd"
            name="password"
            placeholder="Password"
            required
          />
          <img
            class="visibility-icon"
            [src]="iconSrc"
            alt="visibility icon"
            (click)="showPassword()"
          />
        </div>
      </form>
    </div>
    <div class="d-flex column">
      <button class="dark-btn">Log In</button>
      <button class="white-btn">Guest Log In</button>
    </div>
  </section>
  <section class="d-flex center signup-wrapper">
    <p>Not a Member?</p>
    <a class="dark-btn-signup" routerLink="/signup">Sign Up</a>
  </section>
  <footer class="d-flex center footer-wrapper">
    <a class="footer-links" routerLink="/privacy-police">Privacy Policy</a>
    <a class="footer-links" routerLink="/legal-notice">Legal Notice</a>
  </footer>
</main>
